<html lang="es">

	<meta charset="UTF-8">
	<title>Presupuesto | Áurea Books</title>

</head>
<body>

<header>
	<nav class="navbar">
		<div class="logo">Áurea Books</div>
		<ul class="menu">
			<li><a href="index.html">Inicio</a></li>
			<li><a href="productos.html">Catálogo</a></li>
			<li><a href="presupuesto.html" class="active">Presupuesto</a></li>
			<li><a href="contacto.html">Contacto</a></li>
		</ul>
	</nav>
</header>

<main>

	<section class="page-header">
		<h1>Solicitar presupuesto</h1>
		<p>Cuéntanos tu proyecto editorial</p>
	</section>

	<section class="form-section">
		<form action="#" method="post" class="form">

			<label for="name">Nombre</label>
			<input type="text" id="name" name="name" required>

			<label for="email">Email</label>
			<input type="email" id="email" name="email" required>

			<label for="phone">Teléfono</label>
			<input type="tel" id="phone" name="phone" required pattern="[0-9]{9}">

			<label for="message">Solicite más información</label>
			<textarea id="message" name="message" rows="5" required></textarea>

			<label class="checkbox">
				<input type="checkbox" required>
				Acepto la Política de privacidad
			</label>

			<button type="submit" class="btn">Enviar solicitud</button>

		</form>
	</section>

</main>

<footer>
	<div class="footer-content">
		<div class="social">
				<a href="#"><img src="img/social/fb.PNG" alt="Facebook"></a>
				<a href="#"><img src="img/social/i.PNG" alt="Instagram"></a>
				<a href="#"><img src="img/social/x.JPG" alt="Twitter"></a>
		</div>
	<p>Áurea Books · Calle de las Letras 12, Madrid</p>
	<p><a href="#">Aviso legal</a></p>
	</div>
</footer>
